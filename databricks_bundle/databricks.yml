# This is a Databricks asset bundle definition for databricks_bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: databricks_bundle
  uuid: 7a72a546-c464-462e-88d9-3d51446f5999

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

sync:
  paths:
    - "./notebooks/"

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: production
    default: true
    workspace:
      host: https://adb-7405616476771241.1.azuredatabricks.net
    variables:
      catalog: easewithdata_adb
      schema: /Workspace/Users/cse.sitesh@gmail.com/.bundle/${bundle.name}/${bundle.target}
  prod:
    mode: production
    workspace:
      host: https://adb-7405616476771241.1.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/cse.sitesh@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/cse.sitesh@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: easewithdata_adb
      schema: prod
    permissions:
      - user_name: cse.sitesh@gmail.com
        level: CAN_MANAGE
  dev_personal:
    mode: development
    default: true

    workspace:
      host: https://adb-7405616476771241.1.azuredatabricks.net

    variables:
      catalog: easewithdata_adb
      schema: dev_personal_${workspace.current_user.short_name}
